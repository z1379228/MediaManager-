name: Quality

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Ruff and Pytest
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install project and checks
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,ui]" ruff pytest-timeout

      - name: Ruff
        run: >-
          python -m ruff check contracts core tests tools trusted_ui views
          main.py desktop.py

      - name: Pytest
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .work | Out-Null
          python -m pytest -vv -rs --timeout=60 --basetemp=.work/pytest-ci
